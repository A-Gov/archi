# Назва конфігурації автоматичної збірки ядра Archi
name: Build Archi

# Тригери запуску
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Крок 1: Клонуємо форк головного репозиторію Archi
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Крок 2: Встановлюємо Java 21 (вимога свіжого Eclipse RCP)
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Крок 3: Компіляція всіх Eclipse RCP модулів
      - name: Build Archi with Maven
        run: mvn clean package -B -e

      # Крок 4: Завантажуємо готові бінарники застосунку
      - name: Upload Archi Binaries
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: Archi-Binaries
          # Tycho не створює zip-архіви за замовчуванням, а складає готові розпаковані папки
          # у цільовий каталог модуля com.archimatetool.editor.product
          path: com.archimatetool.editor.product/target/products/
