# Назва конфігурації автоматичної збірки ядра Archi
name: Build Archi Core (Skip Tests)

# Тригери запуску
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Крок 1: Клонуємо форк головного репозиторію Archi
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Крок 2: Встановлюємо Java 21 (вимога свіжого Eclipse Tycho)
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Крок 3: Компіляція та пакування ПРОДУКТУ з ігноруванням тестів (SWT/UI)
      - name: Build Archi with Maven
        # ВИПРАВЛЕННЯ: Додано прапорець -DskipTests=true для пропуску фази тестування
        run: mvn clean verify -B -e -DskipTests=true

      # Крок 4: Універсальний локатор артефактів
      - name: Locate and Collect Binaries
        if: always()
        run: |
          echo "Шукаємо згенеровані бінарники Tycho..."
          mkdir -p final-binaries
          
          # Шукаємо всі папки 'products' і копіюємо їхній вміст у єдину директорію
          find . -type d -name "products" -exec cp -r {}/* final-binaries/ \\; || true
          
          echo "Вміст зібраних артефактів:"
          ls -la final-binaries/

      # Крок 5: Завантажуємо папку з готовими бінарниками
      - name: Upload Archi Binaries
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: Archi-Binaries
          path: final-binaries/
